name: Notify Telegram on Release

on:
  release:
    types: [published]
  workflow_dispatch:

# Definindo a variável no contexto de ambiente do workflow
env:
  THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }} # Ou um ID fixo como "123"

jobs:
  notify-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Send message to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          # Usando a sintaxe que você solicitou
          THREAD_ID: ${{ env.THREAD_ID }} 
        run: |
          python3 -m pip install requests

          cat << 'EOF' > sendMsg.py
          import requests
          import re
          import os

          def escape_markdown(text):
              if not text: return ""
              escape_chars = r'_*[]()~`>#+-=|{}.!'
              return re.sub(f'([{re.escape(escape_chars)}])', r'\\\1', text)

          # Variáveis de ambiente
          BOT_TOKEN = os.getenv("TELEGRAM_TOKEN")
          CHAT_ID = os.getenv("TELEGRAM_CHAT_ID")
          REPO = os.getenv("REPOSITORY")
          GH_TOKEN = os.getenv("GITHUB_TOKEN")
          # Captura o THREAD_ID do env do shell
          THREAD_ID_ENV = os.getenv("THREAD_ID")

          gh_url = f"https://api.github.com/repos/{REPO}/releases/latest"
          headers = {"Authorization": f"Bearer {GH_TOKEN}"}
          
          try:
              response = requests.get(gh_url, headers=headers)
              response.raise_for_status()
              release = response.json()
              
              tag = release.get("tag_name", "v?")
              url = release.get("html_url", "")
              body = release.get("body", "Nenhuma nota de release.")
              
              body_escaped = escape_markdown(body[:1500] + ("..." if len(body) > 1500 else ""))

              message = (
                  f"📦 *Nova Release:* `{escape_markdown(tag)}`\n"
                  f"📁 *Repo:* `{escape_markdown(REPO)}`\n\n"
                  f"📝 *Release Notes:*\n"
                  f"{body_escaped}\n\n"
                  f"🔗 [Visualizar no GitHub]({url})"
              )

              telegram_url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
              payload = {
                  "chat_id": CHAT_ID,
                  "text": message,
                  "parse_mode": "MarkdownV2"
              }

              # Validação do Thread ID (deve ser int para o Telegram)
              if THREAD_ID_ENV and THREAD_ID_ENV.strip():
                  try:
                      payload["message_thread_id"] = int(THREAD_ID_ENV)
                  except ValueError:
                      print(f"Aviso: THREAD_ID '{THREAD_ID_ENV}' inválido. Enviando para o chat principal.")

              res = requests.post(telegram_url, json=payload)
              if res.status_code == 200:
                  print(f"Notificação enviada com sucesso para a tag {tag}")
              else:
                  print(f"Erro no Telegram: {res.text}")

          except Exception as e:
              print(f"Falha crítica: {e}")
          EOF

          python3 sendMsg.py