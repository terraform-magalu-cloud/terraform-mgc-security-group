name: Telegram - Notify on Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  notify-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Send message to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Passando as variáveis que o Python vai usar
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
          # Caso use tópicos no Telegram, senão pode deixar vazio
          THREAD_ID: ${{ env.THREAD_ID }}
        run: |
          # Instalando dependência caso não exista (geralmente já vem no runner)
          python3 -m pip install requests

          cat << 'EOF' > sendMsg.py
          import requests
          import re
          import os

          def escape_markdown(text):
              if not text: return ""
              # Caracteres que o MarkdownV2 do Telegram exige escape
              escape_chars = r'_*[]()~`>#+-=|{}.!'
              return re.sub(f'([{re.escape(escape_chars)}])', r'\\\1', text)

          # Coleta dados das variáveis de ambiente do GitHub
          BOT_TOKEN = os.getenv("TELEGRAM_TOKEN")
          CHAT_ID = os.getenv("TELEGRAM_CHAT_ID")
          REPO = os.getenv("REPOSITORY")
          TAG = os.getenv("RELEASE_TAG")
          URL = os.getenv("RELEASE_URL")
          BODY = os.getenv("RELEASE_BODY", "Sem changelog.")
          THREAD_ID = os.getenv("THREAD_ID")

          # Formatação da mensagem
          body_escaped = escape_markdown(BODY[:1000]) # Limite de caracteres

          message = (
              f"🚀 *Nova Release Disponível*\n"
              f"*Repositório:* `{escape_markdown(REPO)}`\n"
              f"*Versão:* `{escape_markdown(TAG)}`\n\n"
              f"🔗 [Ver no GitHub]({URL})\n\n"
              f"📜 *Changelog:*\n{body_escaped}"
          )

          telegram_url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
          payload = {
              "chat_id": CHAT_ID,
              "text": message,
              "parse_mode": "MarkdownV2",
          }
          if THREAD_ID:
              payload["message_thread_id"] = THREAD_ID

          resp = requests.post(telegram_url, json=payload)
          if resp.status_code == 200:
              print("Mensagem enviada com sucesso!")
          else:
              print(f"Erro: {resp.status_code} - {resp.text}")
          EOF

          python3 sendMsg.py
